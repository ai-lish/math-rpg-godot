name: Godot HTML5 Export

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    container:
      image: barthel/godot-export:4.3
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
      
      - name: Setup Godot Project
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.3.stable
          cp -r /home/godot/.local/share/godot/export_templates/4.3.stable ~/.local/share/godot/export_templates/
      
      - name: Export HTML5
        run: |
          mkdir -p build
          godot --headless --export-release "web" build/index.html
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: export
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
