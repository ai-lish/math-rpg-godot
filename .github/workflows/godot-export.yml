name: Godot HTML5 Export

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Remove MCP plugin for export
        run: rm -rf addons/mcp_server

      - name: Setup Godot templates
        run: |
          # Find where templates actually are in this container
          TEMPLATE_DIR=$(find / -name "web_nothreads_release.zip" 2>/dev/null | head -1 | xargs dirname 2>/dev/null || echo "")
          echo "Found templates at: $TEMPLATE_DIR"
          # Create expected path and copy
          mkdir -p /github/home/.local/share/godot/export_templates/4.3.stable
          if [ -n "$TEMPLATE_DIR" ]; then
            cp -r "$TEMPLATE_DIR"/* /github/home/.local/share/godot/export_templates/4.3.stable/
          else
            # Try common locations
            for src in \
              /root/.local/share/godot/export_templates/4.3.stable \
              /home/godot/.local/share/godot/export_templates/4.3.stable \
              /usr/local/lib/godot/export_templates/4.3.stable; do
              if [ -d "$src" ]; then
                cp -r "$src"/* /github/home/.local/share/godot/export_templates/4.3.stable/
                echo "Copied from $src"
                break
              fi
            done
          fi
          ls /github/home/.local/share/godot/export_templates/4.3.stable/ | head -10

      - name: Export HTML5
        run: |
          mkdir -p build
          godot --headless --export-release "Web" build/index.html

      - name: Add .nojekyll
        run: touch build/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: export
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
